<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Vi Mår Bra - حملة إعمار وتطوير المساجد في السويد">
  <title data-page-title="Campaigns">Campaigns | Vi Mår Bra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrapCss">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/img/logo-emblem.png">
</head>
<body>
  <div class="topbar">
    <nav class="navbar navbar-expand-lg">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3" href="../">
          <span class="brand-mark"><img src="../assets/img/logo-header-vmboutline.png" alt="Vi Mår Bra emblem"></span>
          <span class="brand-copy"><span class="brand-name">Vi Mår Bra</span><span class="brand-sub" data-i18n="siteTagline"></span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto gap-lg-1"><li class="nav-item"><a class="nav-link" href="../" data-i18n="navHome"></a></li>
<li class="nav-item"><a class="nav-link active" href="../campaigns/" data-i18n="navCampaigns"></a></li>
<li class="nav-item"><a class="nav-link" href="../current/" data-i18n="navCurrent"></a></li>
<li class="nav-item"><a class="nav-link" href="../membership/" data-i18n="navMembership"></a></li>
<li class="nav-item"><a class="nav-link" href="../about/" data-i18n="navAbout"></a></li>
<li class="nav-item"><a class="nav-link" href="../contact/" data-i18n="navContact"></a></li></ul>
          <div class="btn-group mt-3 mt-lg-0">
            <button class="btn btn-lang" data-lang-btn="ar">AR</button>
            <button class="btn btn-lang" data-lang-btn="sv">SV</button>
          </div>
        </div>
      </div>
    </nav>
  </div>

  <section class="page-hero">
    <div class="container">
      <div class="panel reveal pattern-islamic">
        <div class="row g-4 align-items-center">
          <div class="col-lg-8">
            <div class="highlight-line"></div>
            <h1 class="section-title mb-3" data-i18n="campaignsTitle"></h1>
            <p class="section-text mb-0" data-i18n="campaignsLead"></p>
          </div>
          <div class="col-lg-4">
            <div class="stats-grid">
              <div class="stat-box p-3"><div class="kpi-value fs-4" id="statsTotalMosques"></div><div class="small-muted" data-i18n="totalMosques"></div></div>
              <div class="stat-box p-3"><div class="kpi-value fs-4" id="statsCompletedProjects"></div><div class="small-muted" data-i18n="completedProjects"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section-pad pt-0">
    <div class="container">
      <div class="row g-4 align-items-start">
        <div class="col-xl-7 reveal">
          <div class="panel p-0 overflow-hidden vmb-map-panel">
            <div class="vmb-map-panel-head">
              <div>
                <div class="eyebrow mb-2"><i class="bi bi-geo-alt"></i> <span data-map-i18n="mapEyebrow"></span></div>
                <h2 class="fw-bold mb-2" data-map-i18n="mapTitle"></h2>
                <p class="small-muted mb-0" data-map-i18n="mapLead"></p>
              </div>
              <div class="vmb-map-filters" role="group" aria-label="Map filters">
                <button type="button" class="map-filter-btn is-active" data-map-filter="all"></button>
                <button type="button" class="map-filter-btn" data-map-filter="active"></button>
                <button type="button" class="map-filter-btn" data-map-filter="completed"></button>
              </div>
            </div>
            <div id="campaignsMapCanvas" class="campaigns-live-map" aria-label="Campaigns map"></div>
          </div>
        </div>
        <div class="col-xl-5">
          <div class="panel panel-strong p-4 reveal mb-4" id="campaignsProjectCard"></div>
          <div class="panel panel-strong p-3 p-lg-4 reveal">
            <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
              <strong class="fw-bold" data-map-i18n="listTitle"></strong>
              <span class="badge-soft" id="campaignsVisibleCount">0</span>
            </div>
            <div id="campaignsProjectList" class="campaigns-project-list"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer py-5">
    <div class="container">
      <div class="row g-4 align-items-center">
        <div class="col-lg-6">
          <div class="d-flex align-items-center gap-3 mb-3">
            <span class="brand-mark"><img src="../assets/img/logo-footer-vmbdown.png" alt="Vi Mår Bra emblem"></span>
            <div>
              <strong class="d-block">Vi Mår Bra</strong>
              <span class="small text-white-50" data-i18n="siteTagline"></span>
            </div>
          </div>
          <p class="mb-0" data-i18n="footerText"></p>
        </div>
        <div class="col-lg-6 text-lg-end">
          <a class="me-3" href="../about/" data-i18n="navAbout"></a>
          <a class="me-3" href="../membership/" data-i18n="navMembership"></a>
          <a href="../contact/" data-i18n="navContact"></a>
          <div class="mt-3 small text-white-50">© <span id="yearNow"></span> Vi Mår Bra</div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/maps.js"></script>
</body>
</html>
