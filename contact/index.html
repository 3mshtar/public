  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Vi Mår Bra - حملة إعمار وتطوير المساجد في السويد">
  <title data-page-title="Contact">Contact | Vi Mår Bra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrapCss">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body class="">
  <div class="topbar">
    <nav class="navbar navbar-expand-lg">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3" href="../index.html">
          <span class="brand-mark"><img src="../assets/img/logo-emblem.png" alt="Vi Mår Bra emblem"></span>
          <span class="brand-copy"><span class="brand-name">Vi Mår Bra</span><span class="brand-sub" data-i18n="siteTagline"></span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto gap-lg-1"><li class="nav-item"><a class="nav-link" href="../index.html" data-i18n="navHome"></a></li>
<li class="nav-item"><a class="nav-link" href="../campaigns/index.html" data-i18n="navCampaigns"></a></li>
<li class="nav-item"><a class="nav-link" href="../current/index.html" data-i18n="navCurrent"></a></li>
<li class="nav-item"><a class="nav-link" href="../membership/index.html" data-i18n="navMembership"></a></li>
<li class="nav-item"><a class="nav-link" href="../about/index.html" data-i18n="navAbout"></a></li>
<li class="nav-item"><a class="nav-link active" href="../contact/index.html" data-i18n="navContact"></a></li></ul>
          <div class="btn-group mt-3 mt-lg-0">
            <button class="btn btn-lang" data-lang-btn="ar">AR</button>
            <button class="btn btn-lang" data-lang-btn="sv">SV</button>
          </div>
        </div>
      </div>
    </nav>
  </div>

  
<section class="page-hero">
  <div class="container">
    <div class="panel reveal pattern-islamic">
      <div class="row g-4 align-items-center">
        <div class="col-lg-8">
          <div class="highlight-line"></div>
          <h1 class="section-title mb-3" data-i18n="contactTitle"></h1>
          <p class="section-text mb-0" data-i18n="contactLead"></p>
        </div>
        <div class="col-lg-4">
          <div class="contact-links d-grid gap-3">
            <a class="card-soft p-3" data-whatsapp-link target="_blank"></a>
            <a class="card-soft p-3" data-email-link></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<section class="section-pad pt-0">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-5 reveal">
        <div class="gold-callout p-4 p-lg-5 h-100">
          <div class="highlight-line" style="background:linear-gradient(90deg,#fff,rgba(255,255,255,.35))"></div>
          <h3 class="section-title text-white mb-3" data-i18n="sendMsg"></h3>
          <p class="small-muted mb-4">WhatsApp &amp; Email</p>
          <div class="d-grid gap-3">
            <a class="btn btn-light rounded-pill fw-bold" data-whatsapp-link target="_blank"><span data-i18n="whatsapp"></span></a>
            <a class="btn btn-outline-light rounded-pill fw-bold" data-email-link><span data-i18n="email"></span></a>
          </div>
        </div>
      </div>
      <div class="col-lg-7 reveal">
        <div class="panel p-4 p-lg-5">
          <form id="contactForm" method="POST">
            <input type="hidden" name="_subject" value="VMB Website Contact Form">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://vimarbra.se/contact/?sent=1">
            <div class="row g-3">
              <div class="col-md-6"><input class="form-control" type="text" name="name" data-i18n-placeholder="name" required></div>
              <div class="col-md-6"><input class="form-control" type="text" name="mosque" data-i18n-placeholder="mosqueName" required></div>
              <div class="col-md-6"><input class="form-control" type="tel" name="phone" data-i18n-placeholder="phone" required></div>
              <div class="col-md-6"><input class="form-control" type="email" name="email" data-i18n-placeholder="email" required></div>
              <div class="col-12"><textarea class="form-control" name="message" data-i18n-placeholder="message" required></textarea></div>
              <div class="col-12"><button class="btn btn-vmb" type="submit" data-i18n="submit"></button></div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>


  <footer class="footer py-5">
    <div class="container">
      <div class="row g-4 align-items-center">
        <div class="col-lg-6">
          <div class="d-flex align-items-center gap-3 mb-3">
            <span class="brand-mark"><img src="../assets/img/logo-emblem.png" alt="Vi Mår Bra emblem"></span>
            <div>
              <strong class="d-block">Vi Mår Bra</strong>
              <span class="small text-white-50" data-i18n="siteTagline"></span>
            </div>
          </div>
          <p class="mb-0" data-i18n="footerText"></p>
        </div>
        <div class="col-lg-6 text-lg-end">
          <a class="me-3" href="../about/index.html" data-i18n="navAbout"></a>
          <a class="me-3" href="../membership/index.html" data-i18n="navMembership"></a>
          <a href="../contact/index.html" data-i18n="navContact"></a>
          <div class="mt-3 small text-white-50">© <span id="yearNow"></span> Vi Mår Bra</div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
