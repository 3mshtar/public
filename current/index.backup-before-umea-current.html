<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Vi Mår Bra - حملة إعمار وتطوير المساجد في السويد">
  <title data-page-title="Umeå">Umeå | Vi Mår Bra</title>
  <link rel="icon" type="image/png" href="../assets/img/logo-emblem.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet" id="bootstrapCss">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body class="">
  <div class="topbar">
    <nav class="navbar navbar-expand-lg">
      <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3" href="../">
          <span class="brand-mark"><img src="../assets/img/logo-header-vmboutline.png" alt="Vi Mår Bra emblem"></span>
          <span class="brand-copy"><span class="brand-name">Vi Mår Bra</span><span class="brand-sub" data-i18n="siteTagline"></span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto gap-lg-1"><li class="nav-item"><a class="nav-link" href="../" data-i18n="navHome"></a></li>
<li class="nav-item"><a class="nav-link" href="../campaigns/" data-i18n="navCampaigns"></a></li>
<li class="nav-item"><a class="nav-link active" href="../current/" data-i18n="navCurrent"></a></li>
<li class="nav-item"><a class="nav-link" href="../membership/" data-i18n="navMembership"></a></li>
<li class="nav-item"><a class="nav-link" href="../about/" data-i18n="navAbout"></a></li>
<li class="nav-item"><a class="nav-link" href="../contact/" data-i18n="navContact"></a></li></ul>
          <div class="btn-group mt-3 mt-lg-0">
            <button class="btn btn-lang" data-lang-btn="ar">AR</button>
            <button class="btn btn-lang" data-lang-btn="sv">SV</button>
          </div>
        </div>
      </div>
    </nav>
  </div>

  
<section class="page-hero">
  <div class="container">
    <div class="panel reveal pattern-islamic">
      <div class="row g-4 align-items-center">
        <div class="col-lg-8">
          <div class="highlight-line"></div>
          <h1 class="section-title mb-3" data-i18n="currentTitle"></h1>
          <p class="section-text mb-0" data-i18n="currentLead"></p>
        </div>
        <div class="col-lg-4">
          <div class="gold-callout p-4">
            <div class="d-flex align-items-center gap-2 text-white mb-2"><i class="bi bi-broadcast-pin"></i><span data-i18n="liveSync"></span></div>
            <div class="small text-white-50" data-i18n="amountLive"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<section class="section-pad pt-0">
  <div class="container">
    <div class="row g-4 align-items-stretch">
      <div class="col-lg-7 reveal">
        <div class="panel p-4 p-lg-5 h-100" id="currentCampaignBox">
          <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
            <div>
              <div class="eyebrow mb-3"><i class="bi bi-heart-pulse"></i> <span data-i18n="currentTitle"></span></div>
              <h2 class="section-title mb-2" id="currentTitleText">Umeå</h2>
              <div class="small-muted"><span data-i18n="currentLocation"></span>: <strong id="currentLocationText">Sverige</strong></div>
            </div>
          </div>
          <div class="metric-strip mb-4">
            <div class="metric-mini"><div class="kpi-value fs-3" id="goalValue"><span data-animate-number>0 كرونة</span></div><div class="small-muted" data-i18n="goal"></div></div>
            <div class="metric-mini"><div class="kpi-value fs-3" id="raisedValue"><span data-animate-number>0 كرونة</span></div><div class="small-muted" data-i18n="raised"></div></div>
            <div class="metric-mini"><div class="kpi-value fs-3" id="remainingValue"><span data-animate-number>0 كرونة</span></div><div class="small-muted" data-i18n="remaining"></div></div>
          </div>
          <div class="d-flex justify-content-between small-muted mb-2"><span data-i18n="popupProgress"></span><strong id="currentProgressLabel">0%</strong></div>
          <div class="progress mb-4"><div class="progress-bar" id="currentProgressBar" style="width:0%"></div></div>
          <div class="d-flex flex-wrap justify-content-between gap-3 align-items-center mb-4">
            <div class="small-muted"><span data-i18n="lastUpdated"></span>: <strong id="lastUpdatedValue">Live</strong></div>
            <button class="btn btn-vmb" type="button" data-bs-toggle="modal" data-bs-target="#currentDonateModal" data-i18n="donateNow"></button>
          </div>
          <div class="card-soft p-3"><span id="currentCampaignNote"></span></div>
        </div>
      </div>
      <div class="col-lg-5 reveal">
        <div class="panel p-3 mb-4 text-center">
          <a id="currentCampaignImageLink" href="../current/index.html" class="d-block">
            <img id="currentCampaignImage" src="../assets/img/current-campaign-ar-umea.png" alt="Aktuell kampanj" class="img-fluid rounded-4 shadow-sm">
          </a>
        </div>
        <div class="map-shell vmb-map-shell"><div id="currentCampaignMapCanvas" class="campaigns-live-map is-small" aria-label="Current campaign map"></div></div>
      </div>
    </div>
  </div>
</section>


  <footer class="footer py-5">
    <div class="container">
      <div class="row g-4 align-items-center">
        <div class="col-lg-6">
          <div class="d-flex align-items-center gap-3 mb-3">
            <span class="brand-mark"><img src="../assets/img/logo-footer-vmbdown.png" alt="Vi Mår Bra emblem"></span>
            <div>
              <strong class="d-block">Vi Mår Bra</strong>
              <span class="small text-white-50" data-i18n="siteTagline"></span>
            </div>
          </div>
          <p class="mb-0" data-i18n="footerText"></p>
        </div>
        <div class="col-lg-6 text-lg-end">
          <a class="me-3" href="../about/" data-i18n="navAbout"></a>
          <a class="me-3" href="../membership/" data-i18n="navMembership"></a>
          <a href="../contact/" data-i18n="navContact"></a>
          <div class="mt-3 small text-white-50">© <span id="yearNow"></span> Vi Mår Bra</div>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/maps.js"></script>

  <div class="modal fade" id="currentDonateModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content donate-modal">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title" data-i18n="donationModalTitle"></h5>
          <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-3">
          <p class="small-muted mb-4" data-i18n="donationModalLead"></p>
          <div class="donate-grid">
            <a class="donate-method-card" id="currentSwishLink" target="_blank" rel="noopener">
              <span class="donate-method-icon"><i class="bi bi-phone"></i></span>
              <strong>Swish</strong>
              <span class="small-muted" data-i18n="donateViaSwish"></span>
            </a>
            <a class="donate-method-card" id="currentStripeLink" target="_blank" rel="noopener">
              <span class="donate-method-icon"><i class="bi bi-credit-card-2-front"></i></span>
              <strong>Stripe</strong>
              <span class="small-muted" data-i18n="donateViaStripe"></span>
            </a>
            <a class="donate-method-card" id="currentPaypalLink" target="_blank" rel="noopener">
              <span class="donate-method-icon"><i class="bi bi-paypal"></i></span>
              <strong>PayPal</strong>
              <span class="small-muted" data-i18n="donateViaPaypal"></span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>


</body>
</html>
